<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2028 Tier List — Who's Got a Shot?</title>
<script>
  // Apply theme before paint to prevent flash
  (function(){
    var t = localStorage.getItem('2028_theme');
    if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  :root{
    --bg:#fbfbf9; --panel:#ffffff; --panel2:#f4f3ef; --line:#e4e3de;
    --text:#1a1a1d; --muted:#6b6b73; --accent:#1a1a1d;
    --dem:#3f6fd6; --gop:#cf4a52; --ind:#8a72c9;
    --s:#e05a63; --a:#d98b3e; --b:#cbb24a; --c:#5fa872; --d:#4f8fb0; --f:#7d72b8;
    --green:#4caf7d; --red:#cf4a52; --yellow:#cbb24a;
    --radius:10px;
    --btn-primary-bg:#1a1a1d; --btn-primary-text:#f5f5f7;
  }
  html[data-theme="dark"]{
    --bg:#0b0b0c; --panel:#121214; --panel2:#1a1a1d; --line:#27272b;
    --text:#e6e6e8; --muted:#8a8a90; --accent:#e6e6e8;
    --btn-primary-bg:#e6e6e8; --btn-primary-text:#0b0b0c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  /* sleek: no rounded corners anywhere */
  *{border-radius:0 !important;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.4; padding-bottom:80px;
  }
  header{
    position:sticky; top:0; z-index:30;
    background:var(--bg); border-bottom:1px solid var(--line);
    padding:12px 14px;
  }
  .h-title{font-size:19px; font-weight:700; letter-spacing:-.2px; display:flex; align-items:baseline; gap:8px;}
  .h-title .yr{font-weight:800; color:var(--text);}
  .h-sub{color:var(--muted); font-size:12.5px; margin-top:3px;}
  .wrap{max-width:760px; margin:0 auto; padding:0 12px;}
  .namerow{display:flex; gap:8px; align-items:center; margin-top:11px;}
  .namerow input{
    flex:1; background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 12px; font-size:15px; outline:none;
  }
  .namerow input:focus{border-color:#3a3a40;}

  .toolbar{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 6px;}
  button{
    font-family:inherit; cursor:pointer; border-radius:8px;
    padding:9px 13px; font-size:13.5px; font-weight:600; color:var(--text);
    background:var(--panel2); border:1px solid var(--line);
  }
  button:active{opacity:.7;}
  button.primary{background:var(--btn-primary-bg); border-color:var(--btn-primary-bg); color:var(--btn-primary-text);}
  button.ghost{background:transparent;}
  button.danger{background:transparent; border-color:var(--line); color:#c97b80;}

  .ask-ai{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:6px 0 2px;}
  .ask-label{font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px;}
  .ai-btn{display:inline-flex; align-items:center; gap:7px;}
  .ai-btn svg{width:16px; height:16px; display:block;}

  .filters{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0;}
  .filters button{padding:6px 12px; font-size:12.5px; border-radius:7px;}
  .filters button.active{background:var(--panel2); border-color:#3a3a40; color:var(--text);}

  /* Tiers */
  .tier{
    display:flex; align-items:stretch; margin-bottom:6px; border-radius:var(--radius);
    overflow:hidden; border:1px solid var(--line); background:var(--panel);
  }
  .tier-label{
    width:52px; flex:0 0 52px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-weight:800; font-size:22px; color:#0b0b0c; padding:6px 2px; text-align:center;
  }
  .tier-label small{font-size:8px; font-weight:700; line-height:1.1; margin-top:3px; opacity:.8;}
  .tier-S .tier-label{background:var(--s);} .tier-A .tier-label{background:var(--a);}
  .tier-B .tier-label{background:var(--b);} .tier-C .tier-label{background:var(--c);}
  .tier-D .tier-label{background:var(--d);} .tier-F .tier-label{background:var(--f);}
  .drop{
    flex:1; min-height:60px; display:flex; flex-wrap:wrap; gap:6px; padding:7px;
    align-content:flex-start;
  }
  .drop.pool{
    background:var(--panel); border:1px dashed var(--line); border-radius:var(--radius);
    min-height:90px;
  }
  .pool-wrap{margin-top:6px;}
  .pool-head{display:flex; justify-content:space-between; align-items:center; margin:18px 0 6px;}
  .pool-head h3{margin:0; font-size:13px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px;}

  /* Tiles — flat, party color is a left accent bar (cheap to paint) */
  .tile{
    position:relative; min-width:82px; max-width:140px; flex:0 0 auto;
    background:var(--panel2); border-radius:8px; padding:7px 9px 7px 11px; cursor:grab;
    border:1px solid var(--line); border-left:3px solid var(--line);
    user-select:none; touch-action:manipulation;
  }
  .tile:active{cursor:grabbing;}
  .tile.party-D{border-left-color:var(--dem);}
  .tile.party-R{border-left-color:var(--gop);}
  .tile.party-I{border-left-color:var(--ind);}
  .tile .tname{font-weight:600; font-size:12.5px; line-height:1.15; color:var(--text);}
  .tile .trole{font-size:10px; color:var(--muted); margin-top:2px;}
  .sortable-ghost{opacity:.3;}
  .sortable-chosen{border-color:#4a4a52;}
  .sortable-drag{opacity:1;}

  .theme-toggle{background:transparent; border:1px solid var(--line); height:36px; padding:0 12px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:var(--text); cursor:pointer; flex-shrink:0;}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:8px;}


  /* sections */
  .section{margin-top:24px;}
  .section h2{font-size:15px; margin:0 0 10px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px;}
  .hint{color:var(--muted); font-size:12.5px;}

.save-indicator{font-size:12px; font-weight:600; padding:4px 10px; vertical-align:middle;}
  .save-indicator.saved{color:var(--green);}
  .save-indicator.unsaved{color:var(--muted);}

  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--btn-primary-bg); color:var(--btn-primary-text); padding:10px 18px; border-radius:8px; font-weight:600; font-size:13px; z-index:300; opacity:0; pointer-events:none; transition:opacity .2s;}
  .toast.show{opacity:1;}

  .cta-wrap{text-align:center; margin:32px 0 16px;}
  .cta-wrap button{font-size:16px; padding:14px 28px;}
  .share-result{margin-top:10px;}
  .share-result label{display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600;}
  .share-result .copy-row{display:flex; gap:6px;}
  .share-result .copy-row input{flex:1; background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:9px 11px; font-size:14px; font-family:ui-monospace,Menlo,monospace; outline:none;}
  .share-result .grid-btns{display:flex; gap:6px; margin-top:8px;}

  @media(max-width:480px){
    .tier-label{width:44px; flex-basis:44px; font-size:19px;}
    .tile{min-width:76px;}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <div class="h-title"><span class="yr">2028</span> Tier List · Who's Got a Shot?</div>
        <div class="h-sub">Rank the contenders. Share your list.</div>
      </div>
      <button class="theme-toggle" id="themeBtn" title="Toggle dark mode">Dark</button>
    </div>
    <div class="namerow" id="nameRow">
      <input id="userName" type="text" placeholder="Enter your name…" maxlength="32" autocomplete="off">
    </div>
  </div>
</header>

<div class="wrap">

  <div class="toolbar">
    <button class="primary" id="genBtn">Share Your Tier List</button>
    <span id="saveIndicator" class="save-indicator" style="display:none;"></span>
<button id="randomBtn">Randomize</button>
    <button class="danger" id="resetBtn">Reset</button>
  </div>

  <!-- Ask AI -->
  <div class="ask-ai">
    <span class="ask-label">Ask AI about your list</span>
    <button class="ai-btn" id="askClaude" title="Open in Claude with your tier list prefilled">
      <svg viewBox="0 0 46 32" aria-hidden="true"><path fill="#D97757" d="M32.73 0h-6.945L38.45 32h6.945L32.73 0ZM12.665 0 0 32h7.082l2.59-6.72h13.25l2.59 6.72h7.082L19.929 0h-7.264Zm-.702 19.337 4.334-11.246 4.334 11.246h-8.668Z"/></svg>
      Claude
    </button>
    <button class="ai-btn" id="askGPT" title="Open in ChatGPT with your tier list prefilled">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944zm-9.6607-4.1254a4.4708 4.4708 0 0 1-.5346-3.0137l.142.0852 4.783 2.7582a.7712.7712 0 0 0 .7806 0l5.8428-3.3685v2.3324a.0804.0804 0 0 1-.0332.0615L9.74 19.9502a4.4992 4.4992 0 0 1-6.1408-1.6464zM2.3408 7.8956a4.485 4.485 0 0 1 2.3655-1.9728V11.6a.7664.7664 0 0 0 .3879.6765l5.8144 3.3543-2.0201 1.1685a.0757.0757 0 0 1-.071 0l-4.8303-2.7865A4.504 4.504 0 0 1 2.3408 7.872zm16.5963 3.8558L13.1038 8.364 15.1192 7.2a.0757.0757 0 0 1 .071 0l4.8303 2.7913a4.4944 4.4944 0 0 1-.6765 8.1042v-5.6772a.79.79 0 0 0-.407-.667zm2.0107-3.0231l-.142-.0852-4.7735-2.7818a.7759.7759 0 0 0-.7854 0L9.409 9.2297V6.8974a.0662.0662 0 0 1 .0284-.0615l4.8303-2.7866a4.4992 4.4992 0 0 1 6.6802 4.66zM8.3065 12.863l-2.02-1.1638a.0804.0804 0 0 1-.038-.0567V6.0742a4.4992 4.4992 0 0 1 7.3757-3.4537l-.142.0805L8.704 5.459a.7948.7948 0 0 0-.3927.6813zm1.0976-2.3654l2.602-1.4998 2.6069 1.4998v2.9994l-2.5974 1.4997-2.6067-1.4997Z"/></svg>
      ChatGPT
    </button>
  </div>

  <!-- Tiers -->
  <div id="tiers"></div>

  <!-- Pool -->
  <div class="pool-wrap">
    <div class="pool-head">
      <h3>Unranked Pool</h3>
    </div>
    <div class="filters" id="filters">
      <button data-f="all" class="active">All</button>
      <button data-f="D">Dems</button>
      <button data-f="R">GOP</button>
    </div>
    <div class="drop pool" id="pool" data-tier=""></div>
  </div>

  <!-- Share section -->
  <div class="section" id="shareSection" style="display:none;">
    <div class="card">
      <h2>Your Shareable Link</h2>
      <div class="share-result">
        <label>Link</label>
        <div class="copy-row">
          <input id="shareUrl" type="text" readonly>
          <button class="primary" id="copyLink">Copy Link</button>
        </div>
      </div>
      <div class="share-result" style="margin-top:12px;">
        <label>Share Image</label>
        <div id="shareImageWrap" style="margin-top:6px; line-height:0;"></div>
        <div class="grid-btns">
          <button class="primary" id="copyImage">Copy Image</button>
          <button id="downloadImage">Save PNG</button>
        </div>
      </div>
    </div>
  </div>

<!-- Read-only CTA -->
  <div class="cta-wrap" id="ctaWrap" style="display:none;">
    <button class="primary" id="ctaBtn">Make Your Own Tier List</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ============================ DATA ============================ */
const CANDIDATES = [
  // Establishment Dems
  {name:"Gavin Newsom", party:"D", role:"CA Gov"},
  {name:"Kamala Harris", party:"D", role:"former VP"},
  {name:"Pete Buttigieg", party:"D", role:"former Trans Sec"},
  {name:"AOC", party:"D", role:"NY Rep"},
  {name:"Tim Walz", party:"D", role:"MN Gov"},
  {name:"Bernie Sanders", party:"D", role:"VT Sen"},
  {name:"Elizabeth Warren", party:"D", role:"MA Sen"},
  {name:"Cory Booker", party:"D", role:"NJ Sen"},
  {name:"JB Pritzker", party:"D", role:"IL Gov"},
  {name:"Gretchen Whitmer", party:"D", role:"MI Gov"},
  {name:"Mark Kelly", party:"D", role:"AZ Sen"},
  {name:"Amy Klobuchar", party:"D", role:"MN Sen"},
  {name:"Andy Beshear", party:"D", role:"KY Gov"},
  {name:"Wes Moore", party:"D", role:"MD Gov"},
  {name:"Josh Shapiro", party:"D", role:"PA Gov"},
  {name:"John Fetterman", party:"D", role:"PA Sen"},
  {name:"Ro Khanna", party:"D", role:"CA Rep"},
  {name:"Jon Ossoff", party:"D", role:"GA Sen"},
  {name:"Rahm Emanuel", party:"D", role:"former amb."},
  {name:"Andrew Cuomo", party:"D", role:"former NY Gov"},
  {name:"Josh Green", party:"D", role:"HI Gov"},
  // Establishment GOP
  {name:"JD Vance", party:"R", role:"VP"},
  {name:"Marco Rubio", party:"R", role:"Sec State"},
  {name:"Ron DeSantis", party:"R", role:"FL Gov"},
  {name:"Donald Trump Jr.", party:"R", role:"businessman"},
  {name:"Ted Cruz", party:"R", role:"TX Sen"},
  {name:"Vivek Ramaswamy", party:"R", role:"entrepreneur"},
  {name:"Tulsi Gabbard", party:"R", role:"former DNI"},
  {name:"RFK Jr.", party:"R", role:"HHS Sec"},
  {name:"Nikki Haley", party:"R", role:"former SC Gov"},
  {name:"Sarah Huckabee Sanders", party:"R", role:"AR Gov"},
  {name:"Brian Kemp", party:"R", role:"GA Gov"},
  {name:"Tim Scott", party:"R", role:"SC Sen"},
  {name:"Marjorie Taylor Greene", party:"R", role:"GA Rep"},
  {name:"Glenn Youngkin", party:"R", role:"former VA Gov"},
  {name:"Greg Abbott", party:"R", role:"TX Gov"},
  // Rogues
  {name:"Graham Platner", party:"D", role:"Maine oyster farmer & Marine vet", rogue:true},
  {name:"Dan Osborn", party:"I", role:"NE labor organizer", rogue:true},
  {name:"Mark Cuban", party:"D", role:"entrepreneur (D-lean)", rogue:true},
  {name:"Jasmine Crockett", party:"D", role:"TX Rep", rogue:true},
  {name:"Stephen A. Smith", party:"D", role:"ESPN commentator (D-lean)", rogue:true},
  {name:"Tucker Carlson", party:"R", role:"media", rogue:true},
  {name:"Joe Rogan", party:"R", role:"podcaster (R-lean)", rogue:true},
  {name:"Pete Hegseth", party:"R", role:"Defense Sec", rogue:true},
  {name:"Thomas Massie", party:"R", role:"KY Rep / libertarian", rogue:true},
];
const TIERS = [
  {k:"S", desc:"President material"},
  {k:"A", desc:"Strong contender"},
  {k:"B", desc:"Plausible"},
  {k:"C", desc:"Dark horse"},
  {k:"D", desc:"No shot"},
  {k:"F", desc:"Please no"},
];

/* ============================ STATE ============================ */
const LS = {
  name:"2028_name", tiers:"2028_tiers",
  myLink:"2028_my_link", mySnapshot:"2028_my_snapshot"
};
function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }

// give built-ins stable ids
CANDIDATES.forEach(c=> c.id = slug(c.name));

let state = {
  name: localStorage.getItem(LS.name) || "",
  tiers: JSON.parse(localStorage.getItem(LS.tiers) || "{}"),   // {id: "S".."F"}
};
function save(){
  localStorage.setItem(LS.name, state.name);
  localStorage.setItem(LS.tiers, JSON.stringify(state.tiers));
  updateSaveIndicator();
}

function hasUnsavedChanges(){
  const snap = localStorage.getItem(LS.mySnapshot);
  if(!snap) return false;
  return JSON.stringify({n:state.name, t:state.tiers}) !== snap;
}

function updateSaveIndicator(){
  const el = $("#saveIndicator");
  if(!el) return;
  const myLink = localStorage.getItem(LS.myLink);
  if(!myLink){ el.style.display = "none"; return; }
  el.style.display = "";
  if(hasUnsavedChanges()){
    el.textContent = "Unsaved changes";
    el.className = "save-indicator unsaved";
  } else {
    el.textContent = "Saved";
    el.className = "save-indicator saved";
  }
}
function candById(id){
  return CANDIDATES.find(x=>x.id===id);
}

/* ============================ RENDER ============================ */
const $ = sel => document.querySelector(sel);
const tiersEl = $("#tiers");
const poolEl = $("#pool");
let currentFilter = "all";

function tile(c){
  const d = document.createElement("div");
  d.className = "tile party-"+c.party;
  d.dataset.id = c.id;
  d.dataset.party = c.party;
  d.dataset.rogue = c.rogue ? "1":"";
  d.innerHTML =
    `<div class="tname">${esc(c.name)}</div>` +
    (c.role ? `<div class="trole">${esc(c.role)}</div>`:"");
  return d;
}
function esc(s){ return (s||"").replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function buildTiers(){
  tiersEl.innerHTML = "";
  TIERS.forEach(t=>{
    const row = document.createElement("div");
    row.className = "tier tier-"+t.k;
    row.innerHTML = `<div class="tier-label">${t.k}</div>`;
    const drop = document.createElement("div");
    drop.className = "drop";
    drop.dataset.tier = t.k;
    row.appendChild(drop);
    tiersEl.appendChild(row);
  });
}

function placeCandidates(){
  // clear all drops + pool
  document.querySelectorAll(".drop").forEach(d=> d.innerHTML="");
  CANDIDATES.forEach(c=>{
    const t = state.tiers[c.id];
    const target = t ? tiersEl.querySelector(`.drop[data-tier="${t}"]`) : poolEl;
    if(target) target.appendChild(tile(c));
  });
  applyFilter();
}

function applyFilter(){
  [...poolEl.children].forEach(el=>{
    let show = true;
    if(currentFilter==="D") show = el.dataset.party==="D";
    else if(currentFilter==="R") show = el.dataset.party==="R";
    el.style.display = show ? "" : "none";
  });
}

/* recompute tier assignments from the DOM after a drag */
function recompute(){
  const t = {};
  tiersEl.querySelectorAll(".drop").forEach(drop=>{
    const tier = drop.dataset.tier;
    [...drop.children].forEach(el=> t[el.dataset.id]=tier);
  });
  state.tiers = t;
  save();
}

/* ============================ SORTABLE ============================ */
function initSortables(){
  const opts = {
    group:"shared", animation:120, easing:"cubic-bezier(.2,.6,.3,1)",
    delayOnTouchOnly:true, delay:120, touchStartThreshold:6,
    ghostClass:"sortable-ghost", chosenClass:"sortable-chosen", dragClass:"sortable-drag",
    onEnd: ()=>{ recompute(); applyFilter(); }
  };
  document.querySelectorAll(".drop").forEach(d=>{ d._sortable = new Sortable(d, opts); });
}

/* ============================ FILTERS ============================ */
$("#filters").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  currentFilter = b.dataset.f;
  [...$("#filters").children].forEach(x=> x.classList.toggle("active", x===b));
  applyFilter();
});

/* ============================ NAME ============================ */
const nameInput = $("#userName");
nameInput.value = state.name;
nameInput.addEventListener("input", ()=>{ state.name = nameInput.value.trim(); save(); });

/* ============================ SHARE IMAGE GENERATOR ============================ */
let lastShareCanvas = null;

function generateShareImage(name, tiers, shareUrl){
  // Group candidates by tier and party
  const tierData = TIERS.map(t=>{
    const inTier = CANDIDATES.filter(c=> tiers[c.id]===t.k);
    return {
      key: t.k,
      blues: inTier.filter(c=> c.party==='D').length,
      reds:  inTier.filter(c=> c.party==='R').length,
      grays: inTier.filter(c=> c.party==='I').length,
    };
  });

  const SQ=16, GAP=3, LABEL_W=36, PAD=16;
  const TITLE_H=44, ROW_H=SQ+10, LEGEND_H=32, URL_H=22, BOT=8;

  // calc max width needed for squares
  let maxSqW=0;
  tierData.forEach(d=>{
    const total=d.blues+d.reds+d.grays;
    if(total>0){
      const w = total*(SQ+GAP)-GAP;
      maxSqW = Math.max(maxSqW, w);
    }
  });

  const W = Math.max(320, LABEL_W+maxSqW+PAD*2+8);
  const H = PAD+TITLE_H+6*ROW_H+LEGEND_H+URL_H+BOT;
  const S = 2; // retina scale

  const canvas = document.createElement('canvas');
  canvas.width = W*S; canvas.height = H*S;
  const cx = canvas.getContext('2d');
  cx.scale(S,S);

  // background
  cx.fillStyle='#ffffff';
  cx.fillRect(0,0,W,H);

  // border
  cx.strokeStyle='#e0e0e0'; cx.lineWidth=1;
  cx.strokeRect(0.5,0.5,W-1,H-1);

  // title
  const font = '-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif';
  cx.fillStyle='#1a1a1d';
  cx.font=`bold 16px ${font}`;
  cx.textBaseline='middle';
  const t1='2028 Tier List';
  cx.fillText(t1, PAD, PAD+14);
  const t1w=cx.measureText(t1).width;
  cx.font=`16px ${font}`;
  cx.fillStyle='#6b6b73';
  cx.fillText(' \u2014 '+(name||'Anon'), PAD+t1w, PAD+14);

  // tier colors
  const TC={S:'#e05a63',A:'#d98b3e',B:'#cbb24a',C:'#5fa872',D:'#4f8fb0',F:'#7d72b8'};
  const BLUE='#3f6fd6', RED='#cf4a52', GRAY='#8a72c9';

  // draw rows
  tierData.forEach((d,i)=>{
    const y = PAD+TITLE_H+i*ROW_H;
    // label
    cx.fillStyle=TC[d.key];
    cx.beginPath(); cx.roundRect(PAD,y,24,SQ,4); cx.fill();
    cx.fillStyle='#fff';
    cx.font=`bold 12px ${font}`;
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(d.key, PAD+12, y+SQ/2);
    cx.textAlign='left';

    // squares
    let x=PAD+LABEL_W;
    function drawGrp(n, color){
      for(let j=0;j<n;j++){
        cx.fillStyle=color;
        cx.beginPath(); cx.roundRect(x,y,SQ,SQ,3); cx.fill();
        x+=SQ+GAP;
      }
    }
    drawGrp(d.blues, BLUE);
    drawGrp(d.reds, RED);
    drawGrp(d.grays, GRAY);
  });

  // legend
  const ly = PAD+TITLE_H+6*ROW_H+10;
  cx.font=`11px ${font}`; cx.textBaseline='middle';
  let lx=PAD;
  [[BLUE,'Dem'],[RED,'GOP'],[GRAY,'Ind']].forEach(([c,l])=>{
    cx.fillStyle=c;
    cx.beginPath(); cx.roundRect(lx,ly-4,10,10,2); cx.fill();
    cx.fillStyle='#6b6b73';
    cx.fillText(l, lx+14, ly+1);
    lx+=14+cx.measureText(l).width+16;
  });

  // url
  cx.fillStyle='#9e9ea6';
  cx.font=`10px ${font}`; cx.textBaseline='alphabetic';
  cx.fillText(shareUrl, PAD, ly+LEGEND_H-4);

  return canvas;
}

/* ============================ SHARE FLOW (API) ============================ */
$("#genBtn").onclick = async ()=>{
  const btn = $("#genBtn");
  btn.disabled = true;
  btn.textContent = "Sharing\u2026";
  try {
    const resp = await fetch("/api/submit", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name: state.name, tiers: state.tiers })
    });
    const data = await resp.json();
    if(!resp.ok){ toast(data.error || "Error"); return; }
    $("#shareUrl").value = data.url;

    // generate image
    lastShareCanvas = generateShareImage(state.name||'Anon', state.tiers, data.url);
    const wrap = $("#shareImageWrap");
    wrap.innerHTML = '';
    const img = document.createElement('img');
    img.src = lastShareCanvas.toDataURL('image/png');
    img.style.cssText = 'max-width:100%; border-radius:8px; border:1px solid var(--line);';
    wrap.appendChild(img);

    // Store link ownership
    localStorage.setItem(LS.myLink, data.id);
    localStorage.setItem(LS.mySnapshot,
      JSON.stringify({n:state.name, t:state.tiers}));
    updateSaveIndicator();

    $("#shareSection").style.display = "block";
    $("#shareSection").scrollIntoView({behavior:"smooth", block:"center"});
  } catch(e){
    toast("Network error");
  } finally {
    btn.disabled = false;
    btn.textContent = "\ud83d\udccb Share Your Tier List";
  }
};

$("#copyLink").onclick = async ()=>{
  const v = $("#shareUrl").value;
  try{ await navigator.clipboard.writeText(v); toast("Link copied!"); }
  catch{ $("#shareUrl").select(); document.execCommand("copy"); toast("Link copied!"); }
};
$("#copyImage").onclick = async ()=>{
  if(!lastShareCanvas){ toast("No image"); return; }
  try {
    const blob = await new Promise(r=> lastShareCanvas.toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    toast("Image copied!");
  } catch(e){ toast("Copy failed — try Save PNG"); }
};
$("#downloadImage").onclick = ()=>{
  if(!lastShareCanvas){ toast("No image"); return; }
  const a = document.createElement('a');
  a.download = '2028-tierlist.png';
  a.href = lastShareCanvas.toDataURL('image/png');
  a.click();
  toast("Image saved");
};

/* ============================ RESET ============================ */
$("#resetBtn").onclick = ()=>{
  if(confirm("Reset your tier list? This can't be undone.")){
    state.tiers = {};
    localStorage.removeItem(LS.myLink);
    localStorage.removeItem(LS.mySnapshot);
    save(); placeCandidates();
    $("#shareSection").style.display="none";
    toast("Reset complete");
  }
};

/* ============================ RANDOMIZE ============================ */
$("#randomBtn").onclick = ()=>{
  if(Object.keys(state.tiers).length && !confirm("Randomly assign every candidate to a tier? This replaces your current list.")) return;
  const t = {};
  CANDIDATES.forEach(c=>{
    t[c.id] = TIERS[Math.floor(Math.random()*TIERS.length)].k;
  });
  state.tiers = t;
  save(); placeCandidates();
  toast("Randomized");
};

/* ============================ ASK AI ============================ */
function buildAIPrompt(){
  const byId = {}; CANDIDATES.forEach(c=> byId[c.id]=c);
  const lines = [];
  TIERS.forEach(t=>{
    const names = Object.keys(state.tiers)
      .filter(id=> state.tiers[id]===t.k)
      .map(id=> byId[id]).filter(Boolean)
      .map(c=> `${c.name} (${c.party})`);
    if(names.length) lines.push(`${t.k}: ${names.join(", ")}`);
  });
  const who = state.name ? `${state.name}'s` : "my";
  const intro =
    `Here is ${who} 2028 US presidential tier list. ` +
    `S = best shot at being a great president, A = strong contender, B = plausible, ` +
    `C = dark horse, D = no shot, F = please no. Party is in parentheses (D/R/I).\n\n` +
    `Tell me what it reveals about my political leanings, who I'm overrating or ` +
    `underrating, and any glaring omissions:\n\n`;
  return intro + lines.join("\n");
}
function askAI(which){
  if(!Object.keys(state.tiers).length){ toast("Rank some candidates first"); return; }
  const enc = encodeURIComponent(buildAIPrompt());
  const url = which==="claude"
    ? "https://claude.ai/new?q=" + enc
    : "https://chatgpt.com/?q=" + enc;
  window.open(url, "_blank", "noopener");
}
$("#askClaude").onclick = ()=> askAI("claude");
$("#askGPT").onclick    = ()=> askAI("gpt");

/* ============================ TOAST ============================ */
let toastTimer=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=> t.classList.remove("show"), 1800);
}

/* ============================ THEME TOGGLE ============================ */
function updateThemeIcon(){
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  $("#themeBtn").textContent = isDark ? "Light" : "Dark";
}
$("#themeBtn").onclick = ()=>{
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  if(isDark){
    document.documentElement.removeAttribute("data-theme");
    localStorage.setItem("2028_theme", "light");
  } else {
    document.documentElement.setAttribute("data-theme", "dark");
    localStorage.setItem("2028_theme", "dark");
  }
  updateThemeIcon();
};
updateThemeIcon();

/* ============================ SHARED VIEW ============================ */
function enterReadOnlyMode(data){
  // Update header
  $(".h-title").innerHTML = `<span class="yr">2028</span> ${esc(data.name)}'s Tier List`;
  $(".h-sub").textContent = "Shared tier list";

  // Hide editor UI
  $("#nameRow").style.display = "none";
  $(".toolbar").style.display = "none";
  $(".pool-wrap").style.display = "none";
  $("#shareSection").style.display = "none";

  const viewTiers = data.tiers || {};

  // Rebuild tiers and place candidates using view data (not state)
  buildTiers();
  document.querySelectorAll(".drop").forEach(d=> d.innerHTML="");
  CANDIDATES.forEach(c=>{
    const t = viewTiers[c.id];
    const target = t ? tiersEl.querySelector(`.drop[data-tier="${t}"]`) : poolEl;
    if(target) target.appendChild(tile(c));
  });

  // Remove unranked candidates from view (they'd be in the hidden pool)
  // Show only tier rows that have candidates
  document.querySelectorAll(".tier").forEach(row => {
    const drop = row.querySelector(".drop");
    if(drop && drop.children.length === 0) row.style.display = "none";
  });

  // Disable sortable
  document.querySelectorAll(".drop").forEach(d=>{
    if(d._sortable) d._sortable.option("disabled", true);
  });

  // Show CTA with context-aware text
  const myLink = localStorage.getItem(LS.myLink);
  $("#ctaWrap").style.display = "block";
  $("#ctaBtn").textContent = myLink ? "Back to My List" : "Make Your Own Tier List";
  $("#ctaBtn").onclick = ()=>{ window.location.href = "/"; };
}

async function checkSharedView(){
  const path = window.location.pathname.replace(/^\//, "");
  if(/^[a-z0-9]{6}$/.test(path)){
    try {
      const resp = await fetch("/api/submission/" + path);
      if(resp.ok){
        const data = await resp.json();
        enterReadOnlyMode(data);
        return true;
      }
    } catch(e){}
  }
  return false;
}

/* ============================ INIT ============================ */
buildTiers();
placeCandidates();
initSortables();
updateSaveIndicator();

checkSharedView();
</script>
